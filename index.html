<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Timetable AI</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
        background: #ffffff;
        color: #1f2937;
    }

    /* ---------- NAVBAR ---------- */
    .navbar {
        width: 100%;
        padding: 16px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .logo {
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 1px;
    }

    .menu {
        display: flex;
        gap: 24px;
        font-size: 14px;
    }

    .menu a {
        text-decoration: none;
        color: #374151;
        cursor: pointer;
    }

    .menu a:hover {
        color: #2563eb;
    }

    .signup-btn {
        background: #2563eb;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 13px;
    }

    .signup-btn:hover {
        background: #1d4ed8;
    }

    /* ---------- MAIN CONTENT ---------- */
    .main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        padding: 40px;
    }

    .box {
        background: #f9fafb;
        border-radius: 14px;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    }

    .left-box h2 {
        font-size: 22px;
        margin-bottom: 40px;
    }

    .schedule-btn {
        display: block;
        margin: 0 auto 12px;
        padding: 14px 30px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 25px;
        font-size: 14px;
        cursor: pointer;
    }

    .schedule-btn:hover {
        background: #1d4ed8;
    }

    .add-event-text {
        text-align: center;
        font-size: 12px;
        color: #6b7280;
    }

    .right-box h3 {
        text-align: center;
        margin-bottom: 16px;
        font-size: 16px;
    }

    .image-placeholder {
        width: 100%;
        height: 180px;
        background: #e5e7eb;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6b7280;
        font-size: 14px;
    }

    /* ---------- BOTTOM SECTION ---------- */
    .bottom-section {
        margin: 0 40px 40px;
        background: #f9fafb;
        padding: 28px;
        border-radius: 14px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.06);
        cursor: pointer;
    }

    .bottom-section h3 {
        font-size: 18px;
    }

    /* ---------- MODAL ---------- */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
        display: none;
        align-items: center;
        justify-content: center;
    }

    .modal {
        background: white;
        width: 90%;
        max-width: 400px;
        padding: 24px;
        border-radius: 14px;
        animation: slideUp 0.3s ease;
        position: relative;
    }

    @keyframes slideUp {
        from { transform: translateY(40px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .close-btn {
        position: absolute;
        top: 12px;
        right: 14px;
        font-size: 18px;
        cursor: pointer;
    }

    .modal h3 {
        margin-bottom: 16px;
        font-size: 18px;
    }

    .modal input {
        width: 100%;
        padding: 10px;
        margin-bottom: 12px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
    }

    .submit-btn {
        width: 100%;
        padding: 12px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }

    .submit-btn:hover {
        background: #1d4ed8;
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 900px) {
        .main {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">SMART TIMETABLE AI</div>

    <div class="menu">
        <a>Home</a>
        <a>Features</a>
        <a>About</a>
        <a>Contact Us</a>
    </div>

    <button class="signup-btn">Sign Up</button>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    <div class="box left-box">
        <h2>AUTO QUOTATIONS</h2>
        <button class="schedule-btn">SCHEDULE TIME TABLE</button>
        <div class="add-event-text">ADD EVENT</div>
    </div>

    <div class="box right-box">
        <h3>RELATED PICTURE</h3>
        <div class="image-placeholder">Image Placeholder</div>
    </div>
</div>

<!-- BOTTOM SECTION -->
<div class="bottom-section" id="openModal">
    <h3>ADD TASK DETAILS</h3>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="close-btn" id="closeModal">×</div>
        <h3>Add Event</h3>

        <input type="text" placeholder="Event Title" />
        <input type="date" />
        <input type="time" />

        <button class="submit-btn">Submit</button>
    </div>
</div>

<!-- JAVASCRIPT -->
<script>
    const modal = document.getElementById("modal");
    const openModal = document.getElementById("openModal");
    const closeModal = document.getElementById("closeModal");

    openModal.addEventListener("click", () => {
        modal.style.display = "flex";
    });

    closeModal.addEventListener("click", () => {
        modal.style.display = "none";
    });

    modal.addEventListener("click", (e) => {
        if (e.target === modal) {
            modal.style.display = "none";
        }
    });
</script>

</body>
</html>
